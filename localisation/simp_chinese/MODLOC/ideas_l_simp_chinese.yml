l_simp_chinese:
 weiliancon_democratic_desc: "/n/n£GFX_weilian_democratic/n/n/n这是威廉二世突破容克贵族桎梏的政治革新 ——1907 年《帝国议会选举权法案》废除三级选举制，赋予所有成年男性平等投票权；1910 年《责任内阁法》确立帝国议会对政府的监督权，霍亨索伦王朝主动将行政权纳入民选机构制衡框架。曾经象征虚假民主的双重议会制，如今成为皇权与民权共治的纽带，联邦议会的普鲁士选票不再拥有绝对否决权，皇帝的御笔需经帝国议会多数同意方可生效"
 westennorth_idea: "虚伪的民主"
 westennorth_idea_desc: "梨花飘落在你窗前"