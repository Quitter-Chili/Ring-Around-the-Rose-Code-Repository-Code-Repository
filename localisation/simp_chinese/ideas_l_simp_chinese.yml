#伦敦尼姆
 LONDON_IDEAS: "伦敦尼姆精神"
 epoch_gear: "时代齿柄"
 Master_of_the_Strait: "海峡之主"
 Four_Cities_Council_less: "四城理事会：毫不协调"
 Oxford_Treaty_Organisation_less: "牛津条约组织：架构混乱"
 Self_sufficiency_issue: "自给问题"
 
 LONDON_IDEAS_desc: "在大瘟疫之后的不列颠，哀鸿遍野，了无生机，翠绿的山丘与高耸的白崖上失去了往日的繁华，英格兰这一辉煌而伟大的文明似乎即将不复存在。然而，伦敦人——也就是伦丁尼姆人却迸发了其无限的智慧，利用机械代替宝贵的人力，不仅拯救了不列颠，甚至更进一步。\n如今，务实，精密与创新已经成为了伦丁尼姆的基础，核心与代名词。从英吉利海峡上的舰队到科学院中的科学家，无不体现着这一点。在机械的轰鸣中，在电流的嗡鸣中和铁轨的轰隆声中，伦丁姆迎来了它的黄金年代。而站在黄金年代的路口，伦丁尼姆精神，又将怎样地将这个国度带入光辉？\n\n\n\n\n\n\n\n£GFX_LONDON_IDEAS\n\n\n\n\n\n\n\n\n\n"
 epoch_gear_desc: "时代的齿轮在转动中咯吱作响。\n谁控制了工业，就控制了世界。在世界的历史上，有无数国家如法厄同一般尝试驾驭，并掌握庞大的产能。然而他们的结局，也不过是被制造无穷无尽的深渊吞没，沦为工业的牺牲品。然而，掌控工业这颗金苹果的诱惑是如此之大，以至于尽管路上布满荆棘与白骨，无数国家还是踏上了它。伦丁尼姆是幸运的。依靠科技的优势，机械的传统与一支强大的海军，它的工业始终先于世界并不断的积累优势，最终成为了世界工业的阀门。从布里斯托尔到多佛尔，大规模的流水线与工业区吸收着资源，再产出战舰，机械与飞机，供向整个世界。依靠这样的力量，伦丁尼姆便在实际上控制着全球的每一分工业，控制着半个世纪的命脉。\n每一个人都知道，如果上帝想要再发一次洪水......\n伦丁尼姆便会造出更多的方舟。\n\n\n\n\n\n\n\n£GFX_epoch_gear\n\n\n\n\n\n\n\n\n\n"
 Master_of_the_Strait_desc: "依托着一支强大的海军，方便的地理位置和对海洋的知识，英吉利海峡，甚至不止英吉利海峡，从锡利群岛到斯卡格拉克海峡，都归于伦丁尼姆的强力控制下。布列塔尼，荷兰甚至法兰西与西班牙，都不得不避免与伦丁尼姆发生冲突。\n然而，海洋对伦丁尼姆是如此重要，以至于陆军被视为海军的附属，长期难以得到必要的训练，同时，对海峡的控制也导致海军难以在波涛汹涌的海面上进行演习。\n\n\n\n\n\n\n\n£GFX_Master_of_the_Strait\n\n\n\n\n\n\n\n\n\n"
 Four_Cities_Council_less_desc: "伦敦，布里斯托尔，南安普敦与牛津构成了伦丁尼姆的核心理事会，工业，商业贸易与科技的代表在此会谈，决定草案与提出决议。他们之间的联合与狂妄决定了，至少一部分上国家的运行良好与否。\n\n现在的理事会能够初步进行会谈，提出决议——但也仅此而已。恶性竞争，利益冲突与发展分歧随处可见，想让四城团结协作是近乎不可能的事。\n\n\n\n\n\n\n£GFX_Four_Cities_Council_less\n\n\n\n\n\n\n\n\n\n“什么？你想通过这个？绝不可能！我们怎么会让你们从中获益？”"
 Oxford_Treaty_Organisation_less_desc: "1833年签订的《牛津条约》，将康沃尔边区，伦丁尼姆公爵领地，约克王国，布列塔尼公国通过贸易的方式联结起来，并在数十年中通过无数修正案，法条与妥协，逐渐形成了一个联盟，维护并主导着西北欧的政治力量。\n\n牛津条约组织仍然混乱而低效，相比个联盟，它更像是一个经济合作组织，而在军事，政治等方面，它更近似一种累赘，而非助力。然而，在发展贸易，保护安全等最初的方面上，它还是能够发挥一定的作用。\n\n\n\n\n\n\n\n£GFX_Oxford_Treaty_Organisation_less\n\n\n\n\n\n\n\n\n\n"
 Self_sufficiency_issue_desc: "伦丁尼姆的本土领土之资源无法满足其本身的需求，而人口紧缺导致的高度城市化又使伦丁姆基本不存在农业生产，因而其近乎所有需求都依靠国外贸易。在和平年代，这的确是个良好的功法。然而，一旦航线被切断，或之遇天灾无法进口，伦丁尼姆就将迅速陷入绝境。如果这问题得不到解决，伦丁尼姆的软弱就将被展现，一切建设都将化作泡影。\n\n\n\n\n\n\n\n£GFX_Self_sufficiency_issue\n\n\n\n\n\n\n\n\n\n"
 lon_bo_jue: "威廉·格罗斯蒙特"
 lon_bo_jue_desc: "威廉·格罗斯蒙特出生在伦敦。作为未来的公爵，他的少年时代被礼仪，优雅与语言填满，看起来将和他父亲一样是一位守成的名义君主。然而，从他进入牛津理工大学开始，一切发生了翻天覆地的变化。学物理，工业与建筑深深吸引了他，他看到了创新，也向创新表明了他的价值：他成为了有史以来第一个真正通过学术获得博士学位的贵族。\n\n在成为公爵后，威廉将大部分经费用于技术开发与工业建设。他创立了维克斯工业，主持了伦丁姆北方段铁路的修建。走进20年代，公爵不仅是国家的象征，也是科学界的象征者。他相信科技的力量，也相信改革的进程。因而，他动用着宪法与为数不少的权力，尽力维护着伦丁姆的温和化与中间化。"
 hurry_bo_jue: "万岁，公爵大人！"
 Progress_gradually: "逐渐进步"
 Industrial_land: "工业之地"
 Industrial_land: "遥想当年奥地利皇帝赐予五大工业巨头封地，不胜感激"

#俄罗斯共和国
 Current_situation_of_the_Russian_Federation: "俄罗斯联邦现状——未来可期?"
 Current_situation_of_the_Russian_Federation_desc: "§R我们的未来在何方？我们的未来在何处......§!\n\n\n\n\n\n\n\n£GFX_Russia_national_Army\n\n\n\n\n\n\n\n\n\n"
 Fragmented_society: "割裂的社会"
 Fragmented_society_desc: "社会的割裂问题也不是一天两天的事情了……\n农村中械斗，城市中的矛盾，议会中的争吵无不在影响着共和国继续往前进但无人能解决这些事情，错综复杂的关系让每一个想要结束现状的操盘手望尘莫及\n第一个10年是如此，那下一个10年?再下一个10年共和国又会变成什么样子，或许到那时会出现一个强大的领导者能带领我们走向新的未来，但在哪之前，还是想想现在该怎么办吧\n§R情况只会越来越糟糕……§!\n\n\n\n\n\n\n\n£GFX_Fading_Lighthouse\n\n\n\n\n\n\n\n\n\n"
 Fading_Lighthouse: "渐暗的灯塔"
 Fading_Lighthouse_desc: "1910年的革命为俄罗斯带来了民主与自由也给已入废墟的世界带来了一束光，但这束光太弱小了……他没能从莫斯科传递到世界甚至欧洲的角落中，民主与自由的革命终究只不过是一场梦罢了\n而现在这个新世界的希望也在不断的沉沦下去，他不再是那个1910年意气风发的共和国了，他已经被在无数次的政治妥协所摧毁，曾经的理想正在消散\n§R灯塔不再像以前那么明亮，灯塔也有熄灭的那天§!\n\n\n\n\n\n\n\n£GFX_what_is_book_russia\n\n\n\n\n\n\n\n\n\n"
 Russia_DuMa: "俄罗斯杜马会议"
 Russia_DuMa_desc: "俄罗斯杜马自亚历山大二世创立以来一直是国家决策的重要机构之一，在1910革命成功后杜马进行民主制的改革后成为了共和国的最高行政机构之一并且在此通过了共和国第一部宪法并举行了第一次大选\n而现在的杜马已经沦为了政客们斗嘴的地方，它不再神圣它不再能代表民义，政客们在杜马上用尽办法，阻碍着那些他们不喜欢法案而这加剧了社会的分裂也加速人们的激进化极端化，它需要一次改革但没人愿意当那个主刀手，毕竟谁也不想被孤立被遗忘……\n\n\n\n\n\n\n\n£GFX_Current_situation_of_the_Russian_Federation\n\n\n\n\n\n\n\n\n\n"
 what_is_book_russia: "文盲遍地"
 what_is_book_russia_desc: "俄罗斯落后了太多了太多了，我们无法从工厂乃至农村中获得更多的人才来推动科技进步，这让俄罗斯如同活在石器时代一样\n长期对农村还有底层人民的教育问题最终成为了一只箭，正中了共和国眉心，成为了共和国最头疼的问题；但现在亡羊补牢或许还来得及\n\n\n\n\n\n\n\n£GFX_Russia_DuMa\n\n\n\n\n\n\n\n\n\n"
 Russia_national_Army: "俄罗斯国民护卫队"
 Russia_national_Army_tt: "§R无法解散，无法训练，无法编辑陆军§!"
 Russia_national_Army_desc: "帝国时期的庞大陆军如同消失了一般，什么都没有给我们留下\n为了保护新生的共和国，我们在每个洲都组建了国民护卫队以来保护共和国不受袭扰与入侵，但这只军队纪律涣散，训练欠佳战斗能力十分低下，很难想象共和国要用这样的一只军队去抵抗手拿利器训练有素的正规军，或许他们能抵住3天，一周?\n\n\n\n\n\n\n\n£GFX_Fragmented_society\n\n\n\n\n\n\n\n\n\n"

#广源联众国
KTO_NB: "粵商嘅通埠"
KTO_NB_desc: "七佰年前，粤商仲喺广州捱世界，蒙古人扼实海关……\n此后，粤国商人扬起风帆，从广东起航，在七百年间踏遍世界各地----北海的摩尔曼斯克不冻港中粤剧人满为患，好望角的桌山峰顶樟树牌匾随处可见，从伦敦至金山城，从西伯利亚至火地岛，你能在任何地方遇见操着粤语的广东佬。也正因广东遍布全球的商人，使得财富迅速从世界汇集至这片江口处，曾被中原那群蛮子鄙视为瘴气丛生未开化的广粤之地在七百年内以惊人速度发展，时至今日，广澳港早已跻身成为世界前列的大现代化都市。广东国在这场搜刮世界财富的大淘金中赚得盆满钵满，成为了名副其实坐在金山上的国家。\n到如今上，这般气象，竟说得是粤民族已然重振，粤国，算是到了极兴旺的时节了。"
KTO_Army: "广州佣兵团"
KTO_Army_desc: "古往今来，贵族家丁总是优质兵源\n作为珠江口聚宝盆的拥有者，广东国泼天的财富足以使其维持一支人员素质与装备质量世界顶尖的常备军队，但由于政体与基本制度等因素，广东国并未组建起一支严格意义上的国家化军队；相反，广东国保留了早期的雇佣兵制，以执政商人私兵为主力与地方志原军构成的军队成为了广东的正规军，这支军队得益于拥有充足的资金维护，长期保持着极高的军事水准与职业素养，并承担着维护东亚乃至太平洋东岸地区秩序与维和的任务，也正因此军事力量存在，广东国遍及世界的贸易港与商队在七百年内仅有几次罕见的遇袭案例，每位兴风作浪的盗贼在看到挂有粤帆旗帜的船只时，首要思考的都不是船上的金银能当多少钱前，而是在掂量自己有多少脑袋与如何逃离这片区域。\n属于广东武装力量的荣耀不会消散。\n七百年裡聽風雨，八萬里疆映月清"
KTO_ZhuJiang_NB: "于珠江之上的璀璨明珠"
KTO_ZhuJiang_NB_desc: "广州依然是摩登城市，是世界金融中心之一\n光阴飞逝，贫瘠，酷热与不宜居住而闻名的广州在这七百年间迅猛发展，直至现在成为世界发展指数最高地区，珠江口三角城已成为了奢华与纸醉金迷的代名词，来自全球的财富汇聚此处，威武高耸的摩天大楼彰显着广与其他国家的差距，巨贾名流皆在此往来，广澳港金融城中曲线图的涨幅牵动着全球商人的神经脉络，世界也因它们的呼吸起伏。\n今日的三角城金银遍布寸土，夜夜生平不止息，华丽璀璨的霓虹灯犹如一支画笔，用液态的火焰在珠江口画布上描绘出欲望、梦想与现代性的轮廓；在这里，时间便是金钱，效率即为生命。"
KTO_Chen_Bing_Qian: "议会总长陈炳谦"
KTO_Chen_Bing_Qian_desc: "陈炳谦，广东国的旭日，其早年便难掩横溢之才华，于洋行历任买办，后在房地产领域大力投资赚取巨额财富；跻身为巨贾的他却华而不奢，富而不糜，犹如广东国的清风，他仪态端庄彬彬文质，却没有透着商人的算计与逐利，且乐善好施，常将个人资产捐赠于公共慈善事业，兴办医院医治鼠疫，筹调粮食平定米荒，让数不胜数连自来水都喝不起，本该在霍乱疾病中痛苦死去的穷人享受到了与富人无二的医疗服务。使得其在平民阶层中收获一致拥趸，名镇南方沿海，成为了公认的国际主义家，各国都传颂着他的美誉与事迹\n靠着强大的经商实力，良好的人缘与民众的支持，陈炳谦顺理成章当选了新一届的广东总长。在他治下，广东国开启了奇迹之后的又一辉煌篇章，经济增长再创新高，资本主义凶恶兽性的獠牙逐渐褪去，即使是最底层的广东人也能拥有自己的居所并解决基本温饱，普通的中产家庭都能靠着家中男主人的努力养活家人，同时在两年内买车买房，甚至带着家人出国去旅游，所有这一切都在宣告：最伟大的时代已经到来，普世价值观将得到最彻底的贯彻，世界将成为广东国治下的和平——当然，在陈炳谦总长的指引下"
KTO_Ning_Bo: "宁波移交方针"
KTO_Ning_Bo_desc: "宁波——南京国主要的港口，其地理地位关乎南京国最忠贞的计划的实施——“上海”\n宁波问题是五年前南京国在混乱中广东后抢夺的地区，当地民众对我们的行为极其厌恶并且非常愤怒，不过其地属实富饶，良港，吞吐量潜力高，现在按照条约规定我们要移交归还了，已经到了规定日期……\n不过说真的就算移交给南京国也无妨，毕竟此地就是我们名不正言不顺所得！我们本就该归还于其了——我们应该与其合作，或者帮助，甚至援助其！——“陈炳谦在一次提问中的回复”不过国内也有异见人士……\n不管怎么样我们都要移交了，向着明天迈进吧！"

#法兰西王国
FRA_Dance: "于苦涩之上的翩然起舞"
FRA_Dance_desc: "法兰西民族已经经历太多苦难了.\n百年战争，无休止的疫病与外敌入侵使得这个曾屹立与西欧的民族千疮百孔，饱经风霜，也许是她的苦难令耶和华亦深感同情，在踌躇跌宕着进入近代后，法兰西度过了一段稳定的宁静岁月，人民们于废墟上互相搀扶此，舔舐伤痕，在缄默中前行，最终铸就了法兰西民族的内核：稳定，保守，温和与协作.\n进入新世纪后，迷茫与困惑仍笼罩着漫漫前路，但人民已不再惊愕与惧怕，他们已跋涉千山万水，眼前险象不过为三千世界中沧海一粟尔尔.\n我们的民族终将复兴，请公民们铭记，法兰西是一个伟大的国度，浪漫的国度，史诗的国度。"
FRA_Progress: "伟大改革的遗产"
FRA_Progress_desc: "十九世纪三十年代因君昏朝颓引发的白色恐怖导致了一场广泛且规模巨大的社会抗议，气愤的民众们对政府不作为失望至极，渴望秩序与安全感的回归，这最终导致了在巴黎的七月王朝建立事件，尽管最终运动在封锁中投降，国王却仍为此次事件付出了巨大代价：原本稀松的中央集权进一步下放，君主立宪被正式制度化确立，国王对国民议会做出了巨大妥协，事实上被架空。\n这场大规模社会起义导致的政治革新事件后被誉为“伟大改革”，法兰西自此在政治制度上成为了时代引领者，并对国家产生了深厚的积极影响，延续至今。"
FRA_ManPoor: "人口弊病"
FRA_ManPoor_desc: "如果是在一个不了解历史的眼里，难以想象这个手握欧洲领土面积排名前几的人口会如此稀薄，但倘若略微了解法兰西民族苦难的一角，对如今的法国人口情况甚至可以称得上乐观，而这一切都需追溯到几世纪前的神罚霍乱---黑死病。\n在黑死病肆虐欧陆之时，法国亦未幸免，彼时尚且因与英格兰长年之战争导致人力匮乏，如同龙卷风般的黑死霍乱更是趁此打劫，将这个民族的脊梁彻底抽走，并套上了一个犹如诅咒的枷锁----凋敝的人口。\n至此浩劫过后，法国便无一日热闹景象，人烟罕迹的中部地带，大片大片的无规则无人区，稀松寂静的城市。尽管历届政府都在努力尝试进行人口的补救，但均如同填海般无济于事。进入二十世纪，政府已对这项投入数世纪无任何进展且消耗巨大的工程逐渐失去了耐心，随着科技的发展与生产力的进步，对人力的需求也日渐减少，也许在不久的将来，法兰西会被迫与这创数世纪前的悲剧和解，最终将镣铐融入身躯，成为这个民族的一部分。。。。。"
FRA_Industry: "高歌猛进的二次工业化"
FRA_Industry_desc: "有人曾预言二十世纪是属于公式的世纪，这句话争议颇高，但却在法国的土地上得到了完美体现：随着法国国内第二次工业化的进行与发展普及，廉价与流水的工业用品涌入千家万户，千篇一律的城市群在此地破土，同质严重的市民逐渐替换掉了法国传统的农民，这当然导致了诸多社会问题与地区，阶级等矛盾，且十分公式化，但仍无法掩盖现代化生活带来的巨大利好：生产力得到解放，生活水平大幅度提高，公共服务与行政质量得到了极大提升。这一切都使得法国人民相信自己走在正确的道路上，且会继续高歌。"