#伦敦尼姆
 BRATION_LON: "不列颠帝国"
 BRATION_SCO: "苏格兰边区"
 ENGLAND_LON: "英格兰王国"
 USA_LON: "美利坚边区"
 IRE_LON: "爱尔兰自治领"
 LONDON_IDEAS: "伦敦尼姆精神"
 epoch_gear: "时代齿柄"
 Master_of_the_Strait: "海峡之主"
 Four_Cities_Council_less: "四城理事会：毫不协调"
 Oxford_Treaty_Organisation_less: "牛津条约组织：架构混乱"
 Self_sufficiency_issue: "自给问题"
 
 LONDON_IDEAS_desc: "在大瘟疫之后的不列颠，哀鸿遍野，了无生机，翠绿的山丘与高耸的白崖上失去了往日的繁华，英格兰这一辉煌而伟大的文明似乎即将不复存在。然而，伦敦人——也就是伦丁尼姆人却迸发了其无限的智慧，利用机械代替宝贵的人力，不仅拯救了不列颠，甚至更进一步。\n如今，务实，精密与创新已经成为了伦丁尼姆的基础，核心与代名词。从英吉利海峡上的舰队到科学院中的科学家，无不体现着这一点。在机械的轰鸣中，在电流的嗡鸣中和铁轨的轰隆声中，伦丁姆迎来了它的黄金年代。而站在黄金年代的路口，伦丁尼姆精神，又将怎样地将这个国度带入光辉？\n\n\n\n\n\n\n\n£GFX_LONDON_IDEAS\n\n\n\n\n\n\n\n\n\n"
 epoch_gear_desc: "时代的齿轮在转动中咯吱作响。\n谁控制了工业，就控制了世界。在世界的历史上，有无数国家如法厄同一般尝试驾驭，并掌握庞大的产能。然而他们的结局，也不过是被制造无穷无尽的深渊吞没，沦为工业的牺牲品。然而，掌控工业这颗金苹果的诱惑是如此之大，以至于尽管路上布满荆棘与白骨，无数国家还是踏上了它。伦丁尼姆是幸运的。依靠科技的优势，机械的传统与一支强大的海军，它的工业始终先于世界并不断的积累优势，最终成为了世界工业的阀门。从布里斯托尔到多佛尔，大规模的流水线与工业区吸收着资源，再产出战舰，机械与飞机，供向整个世界。依靠这样的力量，伦丁尼姆便在实际上控制着全球的每一分工业，控制着半个世纪的命脉。\n每一个人都知道，如果上帝想要再发一次洪水......\n伦丁尼姆便会造出更多的方舟。\n\n\n\n\n\n\n\n£GFX_epoch_gear\n\n\n\n\n\n\n\n\n\n"
 Master_of_the_Strait_desc: "依托着一支强大的海军，方便的地理位置和对海洋的知识，英吉利海峡，甚至不止英吉利海峡，从锡利群岛到斯卡格拉克海峡，都归于伦丁尼姆的强力控制下。布列塔尼，荷兰甚至法兰西与西班牙，都不得不避免与伦丁尼姆发生冲突。\n然而，海洋对伦丁尼姆是如此重要，以至于陆军被视为海军的附属，长期难以得到必要的训练，同时，对海峡的控制也导致海军难以在波涛汹涌的海面上进行演习。\n\n\n\n\n\n\n\n£GFX_Master_of_the_Strait\n\n\n\n\n\n\n\n\n\n"
 Four_Cities_Council_less_desc: "伦敦，布里斯托尔，南安普敦与牛津构成了伦丁尼姆的核心理事会，工业，商业贸易与科技的代表在此会谈，决定草案与提出决议。他们之间的联合与狂妄决定了，至少一部分上国家的运行良好与否。\n\n现在的理事会能够初步进行会谈，提出决议——但也仅此而已。恶性竞争，利益冲突与发展分歧随处可见，想让四城团结协作是近乎不可能的事。\n\n\n\n\n\n\n£GFX_Four_Cities_Council_less\n\n\n\n\n\n\n\n\n\n“什么？你想通过这个？绝不可能！我们怎么会让你们从中获益？”"
 Oxford_Treaty_Organisation_less_desc: "1833年签订的《牛津条约》，将康沃尔边区，伦丁尼姆公爵领地，约克王国，布列塔尼公国通过贸易的方式联结起来，并在数十年中通过无数修正案，法条与妥协，逐渐形成了一个联盟，维护并主导着西北欧的政治力量。\n\n牛津条约组织仍然混乱而低效，相比个联盟，它更像是一个经济合作组织，而在军事，政治等方面，它更近似一种累赘，而非助力。然而，在发展贸易，保护安全等最初的方面上，它还是能够发挥一定的作用。\n\n\n\n\n\n\n\n£GFX_Oxford_Treaty_Organisation_less\n\n\n\n\n\n\n\n\n\n"
 Self_sufficiency_issue_desc: "伦丁尼姆的本土领土之资源无法满足其本身的需求，而人口紧缺导致的高度城市化又使伦丁姆基本不存在农业生产，因而其近乎所有需求都依靠国外贸易。在和平年代，这的确是个良好的功法。然而，一旦航线被切断，或之遇天灾无法进口，伦丁尼姆就将迅速陷入绝境。如果这问题得不到解决，伦丁尼姆的软弱就将被展现，一切建设都将化作泡影。\n\n\n\n\n\n\n\n£GFX_Self_sufficiency_issue\n\n\n\n\n\n\n\n\n\n"
 lon_bo_jue: "威廉·格罗斯蒙特"
 lon_bo_jue_desc: "威廉·格罗斯蒙特出生在伦敦。作为未来的公爵，他的少年时代被礼仪，优雅与语言填满，看起来将和他父亲一样是一位守成的名义君主。然而，从他进入牛津理工大学开始，一切发生了翻天覆地的变化。学物理，工业与建筑深深吸引了他，他看到了创新，也向创新表明了他的价值：他成为了有史以来第一个真正通过学术获得博士学位的贵族。\n\n在成为公爵后，威廉将大部分经费用于技术开发与工业建设。他创立了维克斯工业，主持了伦丁姆北方段铁路的修建。走进20年代，公爵不仅是国家的象征，也是科学界的象征者。他相信科技的力量，也相信改革的进程。因而，他动用着宪法与为数不少的权力，尽力维护着伦丁姆的温和化与中间化。"
 hurry_bo_jue: "万岁，公爵大人！"
 Progress_gradually: "逐渐进步"
 Industrial_land: "工业之地"
 Industrial_land: "遥想当年奥地利皇帝赐予五大工业巨头封地，不胜感激"

#俄罗斯共和国
 Current_situation_of_the_Russian_Federation: "俄罗斯联邦现状——未来可期?"
 Current_situation_of_the_Russian_Federation_desc: "§R我们的未来在何方？我们的未来在何处......§!\n\n\n\n\n\n\n\n£GFX_Russia_national_Army\n\n\n\n\n\n\n\n\n\n"
 Fragmented_society: "割裂的社会"
 Fragmented_society_desc: "社会的割裂问题也不是一天两天的事情了……\n农村中械斗，城市中的矛盾，议会中的争吵无不在影响着共和国继续往前进但无人能解决这些事情，错综复杂的关系让每一个想要结束现状的操盘手望尘莫及\n第一个10年是如此，那下一个10年?再下一个10年共和国又会变成什么样子，或许到那时会出现一个强大的领导者能带领我们走向新的未来，但在哪之前，还是想想现在该怎么办吧\n§R情况只会越来越糟糕……§!\n\n\n\n\n\n\n\n£GFX_Fading_Lighthouse\n\n\n\n\n\n\n\n\n\n"
 Fading_Lighthouse: "渐暗的灯塔"
 Fading_Lighthouse_desc: "1910年的革命为俄罗斯带来了民主与自由也给已入废墟的世界带来了一束光，但这束光太弱小了……他没能从莫斯科传递到世界甚至欧洲的角落中，民主与自由的革命终究只不过是一场梦罢了\n而现在这个新世界的希望也在不断的沉沦下去，他不再是那个1910年意气风发的共和国了，他已经被在无数次的政治妥协所摧毁，曾经的理想正在消散\n§R灯塔不再像以前那么明亮，灯塔也有熄灭的那天§!\n\n\n\n\n\n\n\n£GFX_what_is_book_russia\n\n\n\n\n\n\n\n\n\n"
 Russia_DuMa: "俄罗斯杜马会议"
 Russia_DuMa_desc: "俄罗斯杜马自亚历山大二世创立以来一直是国家决策的重要机构之一，在1910革命成功后杜马进行民主制的改革后成为了共和国的最高行政机构之一并且在此通过了共和国第一部宪法并举行了第一次大选\n而现在的杜马已经沦为了政客们斗嘴的地方，它不再神圣它不再能代表民义，政客们在杜马上用尽办法，阻碍着那些他们不喜欢法案而这加剧了社会的分裂也加速人们的激进化极端化，它需要一次改革但没人愿意当那个主刀手，毕竟谁也不想被孤立被遗忘……\n\n\n\n\n\n\n\n£GFX_Current_situation_of_the_Russian_Federation\n\n\n\n\n\n\n\n\n\n"
 what_is_book_russia: "文盲遍地"
 what_is_book_russia_desc: "俄罗斯落后了太多了太多了，我们无法从工厂乃至农村中获得更多的人才来推动科技进步，这让俄罗斯如同活在石器时代一样\n长期对农村还有底层人民的教育问题最终成为了一只箭，正中了共和国眉心，成为了共和国最头疼的问题；但现在亡羊补牢或许还来得及\n\n\n\n\n\n\n\n£GFX_Russia_DuMa\n\n\n\n\n\n\n\n\n\n"
 Russia_national_Army: "俄罗斯国民护卫队"
 Russia_national_Army_tt: "§R无法解散，无法训练，无法编辑陆军§!"
 Russia_national_Army_desc: "帝国时期的庞大陆军如同消失了一般，什么都没有给我们留下\n为了保护新生的共和国，我们在每个洲都组建了国民护卫队以来保护共和国不受袭扰与入侵，但这只军队纪律涣散，训练欠佳战斗能力十分低下，很难想象共和国要用这样的一只军队去抵抗手拿利器训练有素的正规军，或许他们能抵住3天，一周?\n\n\n\n\n\n\n\n£GFX_Fragmented_society\n\n\n\n\n\n\n\n\n\n"

#广源联众国
KTO_NB: "粵商嘅通埠"
KTO_NB_desc: "七佰年前，粤商仲喺广州捱世界，蒙古人扼实海关……\n此后，粤国商人扬起风帆，从广东起航，在七百年间踏遍世界各地----北海的摩尔曼斯克不冻港中粤剧人满为患，好望角的桌山峰顶樟树牌匾随处可见，从伦敦至金山城，从西伯利亚至火地岛，你能在任何地方遇见操着粤语的广东佬。也正因广东遍布全球的商人，使得财富迅速从世界汇集至这片江口处，曾被中原那群蛮子鄙视为瘴气丛生未开化的广粤之地在七百年内以惊人速度发展，时至今日，广澳港早已跻身成为世界前列的大现代化都市。广东国在这场搜刮世界财富的大淘金中赚得盆满钵满，成为了名副其实坐在金山上的国家。\n到如今上，这般气象，竟说得是粤民族已然重振，粤国，算是到了极兴旺的时节了。"
KTO_Army: "广州佣兵团"
KTO_Army_desc: "古往今来，贵族家丁总是优质兵源\n作为珠江口聚宝盆的拥有者，广东国泼天的财富足以使其维持一支人员素质与装备质量世界顶尖的常备军队，但由于政体与基本制度等因素，广东国并未组建起一支严格意义上的国家化军队；相反，广东国保留了早期的雇佣兵制，以执政商人私兵为主力与地方志原军构成的军队成为了广东的正规军，这支军队得益于拥有充足的资金维护，长期保持着极高的军事水准与职业素养，并承担着维护东亚乃至太平洋东岸地区秩序与维和的任务，也正因此军事力量存在，广东国遍及世界的贸易港与商队在七百年内仅有几次罕见的遇袭案例，每位兴风作浪的盗贼在看到挂有粤帆旗帜的船只时，首要思考的都不是船上的金银能当多少钱前，而是在掂量自己有多少脑袋与如何逃离这片区域。\n属于广东武装力量的荣耀不会消散。\n七百年裡聽風雨，八萬里疆映月清"
KTO_ZhuJiang_NB: "于珠江之上的璀璨明珠"
KTO_ZhuJiang_NB_desc: "广州依然是摩登城市，是世界金融中心之一\n光阴飞逝，贫瘠，酷热与不宜居住而闻名的广州在这七百年间迅猛发展，直至现在成为世界发展指数最高地区，珠江口三角城已成为了奢华与纸醉金迷的代名词，来自全球的财富汇聚此处，威武高耸的摩天大楼彰显着广与其他国家的差距，巨贾名流皆在此往来，广澳港金融城中曲线图的涨幅牵动着全球商人的神经脉络，世界也因它们的呼吸起伏。\n今日的三角城金银遍布寸土，夜夜生平不止息，华丽璀璨的霓虹灯犹如一支画笔，用液态的火焰在珠江口画布上描绘出欲望、梦想与现代性的轮廓；在这里，时间便是金钱，效率即为生命。"
KTO_Chen_Bing_Qian: "议会总长陈炳谦"
KTO_Chen_Bing_Qian_desc: "陈炳谦，广东国的旭日，其早年便难掩横溢之才华，于洋行历任买办，后在房地产领域大力投资赚取巨额财富；跻身为巨贾的他却华而不奢，富而不糜，犹如广东国的清风，他仪态端庄彬彬文质，却没有透着商人的算计与逐利，且乐善好施，常将个人资产捐赠于公共慈善事业，兴办医院医治鼠疫，筹调粮食平定米荒，让数不胜数连自来水都喝不起，本该在霍乱疾病中痛苦死去的穷人享受到了与富人无二的医疗服务。使得其在平民阶层中收获一致拥趸，名镇南方沿海，成为了公认的国际主义家，各国都传颂着他的美誉与事迹\n靠着强大的经商实力，良好的人缘与民众的支持，陈炳谦顺理成章当选了新一届的广东总长。在他治下，广东国开启了奇迹之后的又一辉煌篇章，经济增长再创新高，资本主义凶恶兽性的獠牙逐渐褪去，即使是最底层的广东人也能拥有自己的居所并解决基本温饱，普通的中产家庭都能靠着家中男主人的努力养活家人，同时在两年内买车买房，甚至带着家人出国去旅游，所有这一切都在宣告：最伟大的时代已经到来，普世价值观将得到最彻底的贯彻，世界将成为广东国治下的和平——当然，在陈炳谦总长的指引下"
KTO_Ning_Bo: "宁波移交方针"
KTO_Ning_Bo_desc: "宁波——南京国主要的港口，其地理地位关乎南京国最忠贞的计划的实施——“上海”\n宁波问题是五年前南京国在混乱中广东后抢夺的地区，当地民众对我们的行为极其厌恶并且非常愤怒，不过其地属实富饶，良港，吞吐量潜力高，现在按照条约规定我们要移交归还了，已经到了规定日期……\n不过说真的就算移交给南京国也无妨，毕竟此地就是我们名不正言不顺所得！我们本就该归还于其了——我们应该与其合作，或者帮助，甚至援助其！——“陈炳谦在一次提问中的回复”不过国内也有异见人士……\n不管怎么样我们都要移交了，向着明天迈进吧！"

#法兰西王国
FRA_Dance: "于苦涩之上的翩然起舞"
FRA_Dance_desc: "法兰西民族已经经历太多苦难了.\n百年战争，无休止的疫病与外敌入侵使得这个曾屹立与西欧的民族千疮百孔，饱经风霜，也许是她的苦难令耶和华亦深感同情，在踌躇跌宕着进入近代后，法兰西度过了一段稳定的宁静岁月，人民们于废墟上互相搀扶此，舔舐伤痕，在缄默中前行，最终铸就了法兰西民族的内核：稳定，保守，温和与协作.\n进入新世纪后，迷茫与困惑仍笼罩着漫漫前路，但人民已不再惊愕与惧怕，他们已跋涉千山万水，眼前险象不过为三千世界中沧海一粟尔尔.\n我们的民族终将复兴，请公民们铭记，法兰西是一个伟大的国度，浪漫的国度，史诗的国度。"
FRA_Progress: "伟大改革的遗产"
FRA_Progress_desc: "十九世纪三十年代因君昏朝颓引发的白色恐怖导致了一场广泛且规模巨大的社会抗议，气愤的民众们对政府不作为失望至极，渴望秩序与安全感的回归，这最终导致了在巴黎的七月王朝建立事件，尽管最终运动在封锁中投降，国王却仍为此次事件付出了巨大代价：原本稀松的中央集权进一步下放，君主立宪被正式制度化确立，国王对国民议会做出了巨大妥协，事实上被架空。\n这场大规模社会起义导致的政治革新事件后被誉为“伟大改革”，法兰西自此在政治制度上成为了时代引领者，并对国家产生了深厚的积极影响，延续至今。"
FRA_ManPoor: "人口弊病"
FRA_ManPoor_desc: "如果是在一个不了解历史的眼里，难以想象这个手握欧洲领土面积排名前几的人口会如此稀薄，但倘若略微了解法兰西民族苦难的一角，对如今的法国人口情况甚至可以称得上乐观，而这一切都需追溯到几世纪前的神罚霍乱---黑死病。\n在黑死病肆虐欧陆之时，法国亦未幸免，彼时尚且因与英格兰长年之战争导致人力匮乏，如同龙卷风般的黑死霍乱更是趁此打劫，将这个民族的脊梁彻底抽走，并套上了一个犹如诅咒的枷锁----凋敝的人口。\n至此浩劫过后，法国便无一日热闹景象，人烟罕迹的中部地带，大片大片的无规则无人区，稀松寂静的城市。尽管历届政府都在努力尝试进行人口的补救，但均如同填海般无济于事。进入二十世纪，政府已对这项投入数世纪无任何进展且消耗巨大的工程逐渐失去了耐心，随着科技的发展与生产力的进步，对人力的需求也日渐减少，也许在不久的将来，法兰西会被迫与这创数世纪前的悲剧和解，最终将镣铐融入身躯，成为这个民族的一部分。。。。。"
FRA_Industry: "高歌猛进的二次工业化"
FRA_Industry_desc: "有人曾预言二十世纪是属于公式的世纪，这句话争议颇高，但却在法国的土地上得到了完美体现：随着法国国内第二次工业化的进行与发展普及，廉价与流水的工业用品涌入千家万户，千篇一律的城市群在此地破土，同质严重的市民逐渐替换掉了法国传统的农民，这当然导致了诸多社会问题与地区，阶级等矛盾，且十分公式化，但仍无法掩盖现代化生活带来的巨大利好：生产力得到解放，生活水平大幅度提高，公共服务与行政质量得到了极大提升。这一切都使得法国人民相信自己走在正确的道路上，且会继续高歌。"
#focus
Prepare_for_war: "厉兵秣马"
Prepare_for_war_desc: "这一天已经被等待的太久了。数百年的谋划，又建设与引发，都是为了同一个伟大的目标——重建我们的祖国。自从王国崩解后，英格兰这一伟大的国度便沦落为一个地名。如今，我们手中有着枪，有着人民，有着工业，便是重振英格兰的大好机会。我们不能错过这次机会，厉兵秣马，让英格兰的圣乔治再度飘扬，才是时代需要我们所做的。"

make_a_unoin: "联合起来，我们不可战胜"
make_a_unoin_desc: "康沃尔已经得到了良好的开发，康沃尔地区的使命也已经结束了，它应该重新归于伦尼姆的怀抱；约克王国的王位空缺也已经有数十年了，同时，我们之间的差异也近乎于不存在了。倘若向他们提出合并以重建英格兰的提议，他们没有理由拒绝。与我们合并，既能重建英格兰的光辉，也能获得更好的发展。"
Charge_towards_breakthroughagain: "再接再历，向缺口冲去吧！"
Charge_towards_breakthroughagain_desc: "若说英格兰是一份拼图，那么威尔士毫无疑问是拼图中最突兀的一块。它不仅强占着英格兰的西部，也对英格兰诸国怀有强烈的敌视，不断阻挠着统一。若想为英格兰带来繁荣与和平，威尔士这颗毒苹果便必须被扫清。"

England_reappears: "英格兰重现于世"
England_reappears_desc: "终于，英格兰王国，这一伟大而光荣的名号，再次在这片土地上回荡。王冠再次被戴上，权杖再次被握起，强大而统一的国度再次出现。我们可以自信的大声的喊出：英格兰永存于世，而她将永葆自由！"
first_meeting_country: "第一次全国代表大会"
england_dream: "不列颜的梦想"
england_dream_desc: "从上帝创造不列颠以来，不列颠便从未获得过统一。不论是亚瑟王，爱德华王，亚历山大还是许多的不列颠诸王，都从未能使群岛归于一统，而今日，我们已经无限接近于这一目标，只要击败了苏格兰与爱尔兰，不列颠便能首次成为一个联合的大国。"
Sword_of_Victory: "胜利之剑"
Sword_of_Victory_desc: "我们必须迅速地消灭苏格兰与爱尔兰，否则更可能受到外国的阻挠。我们相信着我们的军队，但仍需要提前做好准备。从阿伯丁到都柏林，我们将安抚当地的人民，准备好我们的军队，一旦开战，便立刻拿下它们。"
Shield_of_Glory: "荣耀之盾"
Shield_of_Glory_desc: "格拉斯哥一直是我国与苏格兰之间最有力的护符，同时，格拉斯哥占据了很大一部分上的西苏格兰地区，如果要尽快统一不列颠，与格拉斯哥的统合便不可缺少。"
last_hit: "最后一击"
last_hit_desc: "是时候向苏格兰与爱尔兰反击了！曾压迫过我们的苏格兰，以及妄图分裂群岛的爱尔兰人，都将受到我国最终的打击。不列颠帝国，作为曾经只在法理上存在过的国度，如今已经出现在世界之上。天佑不列颠帝国！"
old_king_promse: "先王遗愿"
old_king_promse_desc: "爱尔兰岛环之与大陆之外，收纳着我们的反对派，如果不能保证对爱尔兰的强力控制，在未来的日子里，它便会对我们持续造成威胁。遵循先王的遗志，我们将占领爱尔兰，控制当地的反抗，保障我国的安全。"
freedom_ire: "自由爱尔兰"
second_meeting: "第二次全国代表大会"
world_is_ours: "世界属于我们"
world_is_ours_desc: "在经历了世界的大变局后，已经没有任何欧洲国家能与我国在大西洋相争，手握舰队，商品与资金，我们依然能承担大西洋最高权威的责任，并享受其权柄。"
aus_lon_faction: "与德国的联盟"
aus_lon_faction_desc: "英-德同盟已经持续了很长一段时间了。得益于此，法国，伊比利亚与俄罗斯都不敢轻动，欧洲倒是维持了许久的和平。然而近年来，军备竞赛与地缘冲突不断加剧，一切都显示出，危机已经不远。我们必须在风暴中同共济，更进一步地合作，方能使我们的力量不可阻挡。"
annex_northamericanland: "合并北美领地"
annex_northamericanland_desc: "纽芬兰，哈德逊，以及许多其他的北美领地，是英国重要的殖民价值。然而它们都忠于帝国，但却因内耗，内斗不断，无法发挥出应有的作用。将它们合并在同一面旗帜下，统合它们的资源，将有利于我国属地的发展。"
afican_union: "非洲联盟"
afican_union_desc: "殖民的手段已被证明在非洲并不如用，疾病，困苦与缺乏人力折磨着开拓者们。但黄金海岸的成功为我们证明了一点：与当地人合作明显更稳妥。通过适当运用这一方式，我们便能扩张在非洲的帝国。"
chinese_relation: "中国博弈"
chinese_relation_desc: "也许帝国在西方属于一个殖民帝国，但在东方，它完全是一个忠于贸易的“无实体”帝国。在东方，我们并没有殖民地，不过在当地扶持一个傀儡以保护我国贸易利益，也许是一个不错的主意。"
north_ironwall: "北境铁幕"
north_ironwall_desc: "挪威，冰岛与丹麦处在我国的辐射范围内，受到我国的直接与帮助，同时也作为北海，波罗的海的关键要道。邀请它们加入牛津条约，将形成从雷克雅未克到哥本哈根的铁幕，将法国的力量隔绝开来。"
west_to_east: "纽分兰到佛罗里达"
west_to_east_desc: "北美的中央地带被新生的美国掌控…一个好斗，不安定，追求扩张的法式国家，梦想着帝国的领土和市场。我们不能放任此威胁在边境上，特别是当它掌握了广大的市场时。我们的北美必须成为一个更温和的国家，一个更能执行我国意志的国家。"
king_s_king: "万王之王"
king_s_king_desc: "在非洲的属国们对英国很难说的上有忠诚可言，他们只服从于他们的王，对英王这头衔不屑一顾。故此，英王必须加冕为非洲的“万王之王”，以让他们找到一丝认同感。"
aisa_trade: "东亚贸易圈"
aisa_trade_desc: "中国茶叶，日本瓷器，东南亚橡胶…如此多的商品却因争斗而难以保证贸易，这对双方都是一种巨大的不利因素。然而，却没有一个国家愿意维护航线的和平。为了我国的利益，我们应当承担这一责任，并维护航线安全。"
rise_france: "焚尽鸢尾"
rise_france_desc: "法国，以及它的众多帮凶，已经威胁我们太久了。不仅如此，近年来，法兰西组织了无休无止的军备竞赛，想将世界打入万劫不复的境地。对待这些邪恶的敌人，我们必须做好准备，将他们拦在牛津条约之外。"
 
 
 
 
 
 
 
 
 
 
 
 
 
 LON_RAR.1: "召唤"
 LON_RAR.1.t: "召唤"
 LON_RAR.1.d: "威廉·格罗斯蒙特站在青翠的山丘上。这位公爵四下望去，在远远的地平线上，教堂正隐隐露出半个身子。他近乎痴迷的打量着它：它是雾中的高楼：它的投影，以及那在最高处飘扬的，鲜红的圣乔治十字旗。作为英格兰曾经的王室驻所，它在数百年间保持了它的传统，以及——可能是不列颠上最后一面的英格兰旗帜。\n \n威廉没有忘记，当“黑太子”被瘟疫带走前，他曾主持过这里的最后一届典礼；当大亨利·格罗斯蒙特病危难以救治时，他便在这里让后代离开；当伦丁尼姆击退苏格兰人进攻的势头时，最先的战役，也是考文垂战役。又难道它没有与英格兰联结在一起的纽带吗？难道它不是英格兰的象征吗？难道伦丁尼姆不想让这一英格兰的标志重回其领土吗？不是的。考文垂必须回到英格兰的怀抱。\n \n公爵心下了然，他所牵挂所渴望的，一直都不是考文垂本身——不仅是考文垂，而是英格兰，他真正的祖国。一切渴望，一切荣誉，都是为了英格兰。他希望看到圣乔治再度飘扬，他希望看到王冠再临，他希望……是的，他希望！他的心脏因兴奋而开始不安的跳动。他抬头看着远处的考文垂，心下知道，那一天已经不远了，等到一切反对者被扫清时，便是英格兰重建之日。他被一股巨大的快乐包围，轻声唱到：“那是长路归乡……\n "
 LON_RAR.1.a: "- …长路归乡……”"
 LON_RAR.2: "加冕"
 LON_RAR.2.t: "加冕"
 LON_RAR.2.d: "曾经，英格兰是一个伟大的王国，皇家海军披波斩浪，治下人民一心，击败了所有的强敌——丹麦、苏格兰、威尔士、爱尔兰、法兰西等大国，全都是它的手下败将。然而，人间那繁盛的帝国，终究无法抵御神的旨意。在大灾面前，繁盛的城市不堪一击，王室也难以防御，甚至于王国都不存在。\n \n但如今，英格兰再次重现于世，而且比以往任何时候都更强大，更有力量：崭新的英格兰，不可否认地是全球最有活力的国家之一，而它的野心不止于此。\n \n威廉公爵--，不，威廉国王，端坐在御座之上。他手中捏着英格兰君主世代掌握的黄金权杖，他头上环绕着英格兰的王冠，他身上的一个公爵的防御已经完全褪去，取而代之的是国王的风度。他望向周围，议会的议员，英格兰的贵族，都环绕在他的下方，脸上充斥着激动与喜悦。喜悦，是啊，怎能不喜悦呢？英格兰人民世代所求，梦寐以求的统一大愿，如今终于成为现实，他们为王国而喜悦，为国王而喜悦。但他们脸上有些困惑：在加冕前便戴上英格兰的王冠，那么又如何加冕呢？但很快，他们的疑惑便被打消：坎特伯雷大主教托着一份巨大的、远大于英格兰王冠的冠冕走来，高声说道：“承蒙上帝恩典，基督教的守护者，英格兰、威尔士、苏格兰与爱尔兰的共主，兰开斯特公爵、康沃尔伯爵、纽卡斯尔伯爵、马维纳纳斯国王、大西洋的守护者，威廉·格罗斯蒙特，我承上帝旨意，正式宣布你作为不列颠国王与上述头衔的合法拥有者的身份！”说罢，他将冠冕戴在国王的头上。官员们明白了：国王——以及他身后的内阁，目标绝不止于英格兰一隅，他们想要的是统一整个不列颠。最开始如静夜无声，但随后，一声呐喊愈发状大，回荡在白金汉宫巨大的大厅内：\n \n“不列颠之王万岁！”\n“不列颠之王万岁！”"
 LON_RAR.2.a: "“不列颠之王万岁！”"
 LON_RAR.3: "大会开幕！"
 LON_RAR.3.t: "大会开幕！"
 LON_RAR.3.d: "今日，英格兰王国建立后的第一次全国代表大会拉开了帷幕，由克莱特·艾德利将主持大会的进行。关于此次大会的内容，从政治讨论到经济联合不一而足。虽然众说纷纭，但大家都一致认可，一次大会闭幕，英格兰的联合与未来的发展状况将被定下。\n "
 LON_RAR.3.a: "那么，我们开始吧？"
 LON_RAR.4: "五年计划？"
 LON_RAR.4.t: "五年计划？"
 LON_RAR.4.d: "英格兰的主体是伦丁尼姆，每个人都知道。伦尼姆承担着英格兰的大部分经济体量，自然英格兰的经济计划也以伦丁尼姆为主体。然而，这样的发展对约克、康沃尔与威尔士明显不平。\n \n康沃尔的统治与威尔士的议员向我们提出了一份议案，建议让开发署更多地参与当地经济，从而在五年计划中获得对当地的发展。约克有着优良的农业条件，威尔士有着优良的煤炭资源，进行适当的开发能解决东南的燃眉之急。\n \n然而，它也带来了一定的问题：我国的经济无法被统一调动以用于发展，但可以获得更全面的发展。但对我们而言，这相当值得。\n "
 LON_RAR.4.a: "嗯，让它通过吧。"
 LON_RAR.5: "军情五处"
 LON_RAR.5.t: "军情五处"
 LON_RAR.5.d: "英格兰最锋利的小刀——军情五处，起源于伦丁尼姆的安全部。数十年来，它在国内挑出过无数间谍，刺客与恐怖分子，阻挡过纳粹分子，与共产党的游行与集会，维护着社会的公平秩序。\n \n然而，在MI5内部，却有两般改革的声浪：其一是由休·海伦主导的自由化声浪，他们认为，MI5已经偏离了它最初的职能，它应当针对外国的颠覆势力与必要的自卫，甚至需要承担一部分情报职能——总而言之，不干涉公民的生活。另一方是基奇纳曾推动的内务改革，旨在令军情五处成为一支有足够能力维持国内稳定的组织，使英格兰成为一道防波堤，免遭共产主义或法西斯主义的威胁。议案已经被提出，而在最终投票之后…\n "
 LON_RAR.5.a: "军情五处将为了人民而奋斗"
 LON_RAR.5.b: "军情五处将公诸于世"
 LON_RAR.6: "闭幕"
 LON_RAR.6.t: "闭幕"
 LON_RAR.6.d: "第一次全国代表大会落下了帷幕。英格兰在数天的讨论内，已经对未来有了初步的共识，而关于未来的方向，也已经有了答案。尽管大会结束了，但对英格兰而言，这不是结束，甚至不是结束的开始，它只是开始的结束。\n \n从爱丁堡到斯凯斯特，从奥斯陆到芒斯特，还有如此多的事务待解决，还有如此多的国家待联合，我们怎能再耽搁那怕一分钟呢？\n "
 LON_RAR.6.a: "踏上新征程"
 LON_RAR.7: "第二次全国代表大会"
 LON_RAR.7.t: "第二次全国代表大会"
 LON_RAR.7.d: "在修复后整修一新的苏格兰宫殿中，如今已被整理为大会的场地。但在巨大的帷幕，记者的人潮与高大的主席台间，仍然透出宫殿原有的富丽堂皇。其间或某个名贵雕塑的一角，或是某样名作的一瞥，毫无疑问，甚至要华贵过王室的财富，而这种奢华的定位，导致了如今在这里开的，并不是苏格兰的宴会，而是不列颠的全国代表大会。\n \n大会主席克莱门特·艾德礼端坐在主席台上，看着手中的文件。他正值壮年，但却很疲惫。自从北进与开发署建立以来，他几乎一刻不停地在工作，为当地提各类法案，看他光亮的头顶便为之可了。而因此，他面容殊，将文件在桌上拢了拢：“我宣布，大会开场！”\n \n很快，数份议案被摆到他手中，还有更多的一级议案在各个委员会处理。艾德利看着面前的议案，叹了口气：“先解决哪一个呢…？”\n "
 LON_RAR.7.a: "苏格兰问题，也许？"
 LON_RAR.8: "苏格兰问题"
 LON_RAR.8.t: "苏格兰问题"
 LON_RAR.8.d: "艾德礼正在翻阅议案，发现其中还夹着一封信：\n \n致亲爱的财政部长，内阁副总理艾德礼阁下：\n苏格兰的形势不容乐观。虽然当地民众对我们很友好，我国在当地的驻军也极其克制，但当地还是存在一定问题：政治上，当地保王党持续威胁着稳定情况，经济上，由于苏格兰实施高度严格的经济限制，苏格兰的经济已经难以与我国的自由市场接轨。如果放任这种情况下去，要么苏格兰地区将无法发展，要么我们会失去当地人民的信任。\n \n苏格兰地区长官\n亚瑟·格特伍兹\n艾德利放下信件，看向议案。摆在他面前的两条路很清晰：其一，是对苏格兰实施自治管理，让它拥有自治领的权力——直到它与英格兰接轨并合并；其二，是在当地设立特区，通过开发署的力量使苏格兰独立于伦丁尼姆模式发展。对于这两条路线，各有其利弊解释：苏格兰自治化虽然能在经济上联合，却留下了政治上的间隙，而特区则刚好相反，用政治上的统一换经济上的脱轨。他敲着桌子，沉思良久。随后，他写了张便签，转身站起，递给大会的收信员后，他坐下来，继续翻动着下一份文件。收信员在他身后打开便签，上面写的是："
 LON_RAR.8.a: "苏格兰应当自治化"
 LON_RAR.8.b: "苏格兰可以成为特区"
 LON_RAR.9: "皇家玫瑰会"
 LON_RAR.9.t: "皇家玫瑰会"
 LON_RAR.9.d: "艾德礼翻开下一份文件，顿时感到一阵棘手。这份文件的目的直指一个新兴团体——玫瑰会。作为起源于牛津理工学院的高级俱乐部，玫瑰会中吸纳了许多新兴的政坛新贵，商业巨子，甚至工会领袖。议会指出，如果任由玫瑰会自由放任地发展，它可能会自成一个不受控的派子，甚至成为独立的党派。\n \n艾德利皱了皱眉，他早听过玫瑰会的大名——一个危险且不受控的团体，如果可能，他毫无疑问会解散它。但他没有理由。玫瑰会只是在行使公民的自由权利，况且，将他们聚在一起也不违法。还有最重要的一点：它的存在维持了社会的稳定。如果没有玫瑰会，在左翼与右翼无限制的行动下，谁知道这社会会变成什么样子？\n \n玫瑰会的存在肯定是不可改变的，艾德礼想，但也许，他能够施加一些手段……\n "
 LON_RAR.9.a: "对玫瑰会进行监视吧"
 LON_RAR.9.b: "铲除玫瑰会的党羽"
 LON_RAR.10: "英联邦"
 LON_RAR.10.t: "英联邦"
 LON_RAR.10.d: "英国虽然看起来掌握的领土不大，但实际上，依靠着舰队，大西洋周边的地区实际上已经处于英国的控制之下。然而，经济、政治、军事上，我国的联盟群体完全不同，而这些完全不同的架构导致英国的海外力量无法得到统一的调控。\n \n同时，对于我们的盟友们，各不相同的组织也像是一场灾难：混乱而无法统一，因此也制约了它们的发展。议案提出，将英国，其自治领与英国辖的地区整合，建立一个处在英国控制下的全面联盟——英联邦。\n \n然而，关于英联邦与现有的华盛顿条约组织之间的关系，却存疑问题。如果将英联邦纳入牛津条约的架构中，会破坏新约内英-德之间的联系与英国和各大国之间的关系；但如果使英联邦独立于牛津之外，那么在职能的问题上便难以区分，将会影响其发展。对于英国而言，这显然是个难以抉择的问题。"
 LON_RAR.10.a: "英联邦不能越权"
 LON_RAR.10.b: "英联邦必须与英国站在一起"
 LON_RAR.11: "西印度问题"
 LON_RAR.11.t: "西印度问题"
 LON_RAR.11.d: "艾德利又处理了几份没有对比再版的文件，手一伸，摸到了薄薄的一张纸——最后一份文件。他拿起它，凑到面前，又是一封信掉出来！他打开信件的蜡封，抽出信纸，看进去：\n \n致大英帝国副总理 克莱特·艾德利阁下：\n自西属北美崩溃以来，西印度群岛便处于无政府状态：无论是伊斯帕尼奥拉、波多黎各、牙买加还是向风群岛，全部处于没有政府的状态。它们或由总督勉力维持，或由当地居民自治，实际上处于崩溃。美国正维护其在巴的利益，新的加勒比海诸国只能伸手握住小安的列斯与巴哈马。\n \n当地具有重大的战略价值与经济效益，一旦夺取这些岛屿，我国在北美与西太平洋的势力将无人可及。我强烈建议拿下这些岛屿。\n \n您忠诚的下属\n大西洋特遣大使\n赫伯特·路易·赛缪尔\n \n艾德利思考了一下。对于英国而言，西印度群岛确实极度重要：扼守大西洋的海军咽喉，极优秀的热带作物种植地，以及英国势力扩张的跳板。但西印度群岛此时法理上仍属于西班牙，倘若直接行动，很可能激怒伊比利亚，甚至逼它加入法国一方。这个选择很难抉择，但总要有个结果。艾德利思忖良久。最终，在大会的闭幕式上，经过委员们的最后一场投票，结果是……"
 LON_RAR.11.a: "国家重于所谓的危机"
 LON_RAR.12: "大会闭幕"
 LON_RAR.12.t: "大会闭幕"
 LON_RAR.12.d: "第二次全国代表大会现已落幕。在数天的时间内，关于这个新生国家未来的方向，各人虽然有不同的答案，但通过数次妥协，谈判与协商，最终找到了共同的方向。相信在国王陛下，内阁和人民的万众一心下英国必将迎来它最辉煌的时刻。"
 LON_RAR.12.a: "为不列颠三呼万岁！"
 LON_RAR.13: "伦敦"
 LON_RAR.13.t: "伦敦"
 LON_RAR.13.d: "从海峡的对岸望去，伦敦只是地平线上一块不起眼的灰色剪影，间或被雾气或海浪挡住。但眼下，我们正乘坐渡轮经过泰晤士河，一座又一座举世闻名的建筑便迤逦地出现在我们面前：带着褐斑的伦敦塔蹲在水中，塔桥站在沿河船只的上方，凝视着我们。威斯敏斯特宫，以及如同玩具一般的格罗斯蒙特塔、“大本钟”，正被摆放在波光与雾色之间。\n这是众城之城，是世界渴望之城。也许广州比它更精明，柏林与维也纳更有才，莫斯科与巴黎更漂亮，但伦敦将它们全都击败。因为伦敦不止是一个城市，它是一座历史奇迹。它是第一座议会首府，第一座工业化城市，第一座帝国港口。《大宪章》在此签署，《牛津条约》在此签署。这里是多佛尔、牛津和英联邦的总部，这里是大西洋每条远洋航线的终点，这里是七家报纸、三座大教堂、七条铁路与五大集团的坐落处。这是一个政治的角斗场，是世界橱窗的工厂，是莎士比亚、格莱斯顿、迪斯雷利、约翰、艾萨克·牛顿、福尔摩斯、费舍尔的城市，是培育了世上最伟大国家的中心。如果你厌倦了伦敦，那你便厌倦了生命，因为伦敦几乎就是一切。 \n在清晨薄雾尚未散去时，向东边的比尔斯特走去。走到那里时，伦敦桥几乎还空无一人。但当你穿过显得有些幽暗冷清的地下步道，再次见到海峡的太阳时，以这世界上最辉煌的城市为背景，帝国之都便在我面前展现出所有的喧闹、色彩与雄浑。 \n在更远的位置，耸立着伦敦塔在雾中模糊不清却闪着光芒的边缘；在身后，是东伦敦车站庞大、拱起的脊背；而在外侧，是伦敦古老，持续而不可阻挡的泰晤士河，在数百万年间一直如一般流动。 这里是世界上最统一、最强势的英式首都，是大英帝国永恒的象征。\n它吸纳着来自全世界的商品，却将非英式人口厌恶地扔出门外。中国茶、印度水果与非洲蔗糖在哈罗德百货公司随处可见，但从顾客、服务员或行人中，却看不到半张非英国的面孔。当伦敦人照镜子时，他会感谢上帝，俯天谢地，在这张中国镜中的人，分毫不差的就是一张英国式的脸。\n 和所有过往的“万城之城”一样，伦敦光彩照人，睥睨世界。它伟大的影响力如同一根长鞭，让你在某个时间、某个地点，突然被它无形的鞭尾击打了一下：也许是北美洲某个绅士正与当地长老讨价还价，也许是广州的某家商行中传出的英语，也许是某位皇帝御座中被奉为座上宾的资本家。占据着东南英格兰的一角，伦敦却将其力量以其神圣的磁附加到各个大陆。 \n尽管伦敦如此强大，但在人类数百万年的历史中，它也必然会步罗马、君士坦丁堡、长安等历史上“万城之城”的后尘，不再作为一个世界之都现身于世，而是挣扎于衰落之中，总有一天。 然而，又会是什么时候呢？放眼望去，从波涛汹涌的英吉利海峡中，我听到了伦敦的回答-"
 LON_RAR.13.a: "-至少，不是今天"
 LON_RAR.14: "汉诺威峰会"
 LON_RAR.14.t: "汉诺威峰会"
 LON_RAR.14.d: "塔姆登仍显得有些寒冷。在这个小小的城市中，从未来过这么多人：帝国宰相，国防大臣，几位亲王与一支专门的军队，都等候在海港边，望向遥远的地平线，希望在其上发现点什么东西。他们的希望很快成了真：在平静单调的地平线上，忽地出现了一片灰色的斑点，而随着斑点的接近，不列颠的舰队咆哮着驶入峡湾。很快，德意志的帝国宰相便与英国的内阁总理在这轮船上握起了友谊之手。\n在数天的会期内，英德双方的友谊跨过了一个台阶——不仅是因为有着共同的敌人，也是因为他们知道互相的无害性：英国不可能也不想建立欧洲的霸权，而德国也对海洋没有兴趣与动力。就像劳合说的，“象与鲸”的合作，成为了世界上最稳定的同盟。\n这数天之内达成的收获颇丰，从政治，经济到军事，英德两国达成更深的合作。同时，得益于两位皇帝达成的良好私人关系与民众之间的友好，达成的协议没有受到任何阻挠。在可预见的未来，整个世界都将围绕着英-德轴心而展开。"
 LON_RAR.14.a: "陆地与海洋的同盟"
 LON_RAR.15: "劳工"
 LON_RAR.15.t: "劳工"
 LON_RAR.15.d: "爱丁堡近日来特别热。\n不知道是不是被吞并后的影响，往年寒冷的爱丁堡这几天都是强烈的太阳，晒得地面略微发烫，令工人大卫十分不满。他在苏格兰亚历山大钢铁厂工作，不，现在叫做不列颠福斯湾钢铁厂工作。在过去的数十年中，这份工作在层层压榨下只能勉强维持他的生命，正因如此，他对祖国的灭亡并没有什么感受。他咒骂苏格兰，咒骂英格兰，咒骂一切让他感到不满的东西。\n新厂长从屋子中走出来，大声喊道：“工人们！我有一项重大事务宣布，不过在此之前……”他打开背后有着扩音器的无线电：“我想让你们听听这个。”工人们只是看了一眼，便继续炼钢的工作。在嘈杂的声音中，大卫抱怨到：“不就是开除某个人或者减薪吗？这种事我见的多了。”\n说罢，恨恨地向一块半熔融的铁块砸去。电台“喀拉”响起，随后是阵杂音，然后是一个中年男人的声音：\n“亲爱的英格兰，威尔士，苏格兰与爱尔兰人民，我现在在唐宁街11号向你们发言……”大卫砸下锤子“咣”的一声，火光四溅，但电台的声音还是能隐约传出：“虽然苏格兰与我们有着长期的纷争，但苏格兰人民却不该承受额外的指责，他们只是被压迫的普通人……”大卫有些讶异，放缓了落锤的力度，以便更好的听清电台中的声音：“……平心而论，我们长期被困在排外的迷雾中，被厌恶与无知蒙蔽，却忘记了在英格兰之外，不列颠各地却饱受贫困的折磨。数十年来，从国王到工厂的所有阶级无节制地从他们身上榨取利润。当我前去爱丁堡时，一个老妇人抓住我，用几乎恳求的语气对我说：‘啊呀，大人，您见过小孩子饿死吗？’我永远无法忘记这一幕……”大卫干脆放下了锤子，与身边的人一同听了起来。他感到，这个人与过往的政客有些不一样：“……我们不仅是英格兰人，更是不列颠人。难道爱尔兰人，苏格兰人，威尔士人就该被如此残酷地对待吗？难道他们不和我们一样，憧憬着一个分体面，稳定的工作与一个快乐的人生吗？放下偏见吧，朋友们。我们所拥有的公平，\n正义，保障，必须同样给予他们！我们必须让每一个人都有尊严的生活！”大卫忽然感到，在他疲惫不堪的心中，第一次出现了些许叫做“希望”的东西。他继续听着，突然想到，也许这是他第一次想要听一名政客讲话：“……全国的劳工部，工会与英格兰的数家企业，已经向各地展开工作。我们希望，在我们的同情，泪水与决心下，‘新耶路撒冷’将出现在英国的土地上，谢谢。”广播“咔哒”一声关闭，大卫仿佛才醒过来，看向四周同样的工人，心中五味杂陈。厂长的声音打破了宁静：“所以，你们也听到了，我们的劳工福利已经下来了！”他挥舞着一张纸片，用另一只手指向几个大箱子：“医疗保障，工会保障，失业津贴……从今以后，你们也同样拥有！以及最重要的，按照工联规定的标准薪资，你们从今往后将有着数倍的收入！我希望，你们也能用同样的热情投入生产……”他的话还没说完，便被一阵洪亮的如钟的欢呼盖过，这么些年来，这还是第一次：\n“万岁！万岁！为我们的国家，万岁！”\n大卫的身上仿佛涌现了无限的活力，他想到，从此以后，他的家人能够吃上热饭，甚至是肉，而不是麦饼；他们可以有一个体面的公寓，而不是棚户。他头一次如此高兴，以至于开始思考一件事："
 LON_RAR.15.a: "“要不…我也买一台无线电吧？”"
 LON_RAR.16: "哦，哈利法克斯！"
 LON_RAR.16.t: "哦，哈利法克斯！"
 LON_RAR.16.d: "在这里，在新斯科舍，哈利法克斯在这儿。\n当然，从一种更艺术的角度而言，哈利法克斯一直在这儿。在这世界上最辽阔，单一，绝对的冰原上，哈利法克斯人建立起了这座新城。海岸的石砾与大洋上的白色碎浪无时不提醒你，在这块孤独大地上，只有这座城市伫立。它是如此具有异地情调，以至于令我在寒冷的北美莫名想起远古的爱尔兰。\n它的荣耀是旧式的，它的礼仪是做作的，它的环境是恶劣的，它的郊区混乱，它的报纸粗俗，它著名的斯科舍厅只是威斯敏斯特的拙劣模仿，它的人民在挣扎中寻求不列颠的认可。它应该不是一个美丽的地方，肯定不是一个英式城市，绝对无法跻身伟大都城的行列。\n啊，不，我并未表示——或明说，这是一座失败的城市，事实上，它算得上一个奇观，不为它的每一个方面，而为它本身。它是英属北美的首府，美洲三大都市之一，北美第一大港，几乎拥有散文般的微妙情调。仅仅在六代以前，这里还是无人存在的不毛之地，而如今，田地环绕，牛羊成群，从不列颠而来的拓荒者将此地改造成了他们心中的模样。我想，哈利法克斯始终拥有着某种魔力，吸引着世界各地的人前来——中国人，印度人，法国人，美国人，然也有英国人，特别是当阳光照耀，使飘扬的国旗带着一种迥异于旧世界的荣光时。在晨光的欢呼中，置身于美洲最东端的大都会，一股强有力的自负攫住了我，宏大的帝国议会在我身后逐渐升高，整条兰开斯特大街与两侧塔楼与城堡都在向我致敬，仿佛阅兵般庄严有序。我想，若是我在这里多停留一段时间，我几乎会为它感到伤感，"
 LON_RAR.16.a: "-一种被过去伟大所撼动的伤感。"
 LON_RAR.17: "行政覆盖"
 LON_RAR.17.t: "行政覆盖"
 LON_RAR.17.d: "夜深了，但加的夫的政府大楼仍然灯火通明。加的夫新上任的市长哈里克正一脸麻木的盯着面前一摞又一摞的文件。抢劫，强奸，盗窃…在这几天层出不穷；威尔士律法已废除，英格兰的法律还未普及，但当地各类犯罪的黑暗将其填补了。\n尽管警力已经到达极限，但也只能手控制那些大型犯罪，而对于多如牛毛的其它犯罪了无办法。哈里克在市区走动时，区区几百米能遇到两次抢劫，加的夫的混乱可见一斑。这一切究竟什么时候才能结束？什么时候才能将稳定带回加的夫！他叹了口气，接着处理文件。\n门被敲响，他头也不抬：“进来。”门被推开，是几名身着苏格兰警服的警察——伦敦人。领头的男性与他握了握手，说道：“伦敦派来的特遣队，来稳定当地局势。”哈里克没精打采的指了指一旁的文件：“案件都在这了。”\n“几周的？看起来不少了。”\n“今天的，还有新的，是今天下午的。”\n警察吃惊的又看进去，随后陷入了沉默。他过了很久才慢慢说道："
 LON_RAR.17.a: "“天哪，这真是一桩麻烦。”"
 LON_RAR.18: "布里斯托尔"
 LON_RAR.18.t: "布里斯托尔"
 LON_RAR.18.d: "突然，远处闪过一阵刺眼的光芒，是簇新的摩天大楼，仿佛一片更古老土地上的纪念碑。略微微醺下，你驾车穿过布里斯托尔湾的某个主拐角。在狭窄的转角间，你的速度被严格定死在了30英里，如同船舱中的鳕鱼干般无有灵魂。但当车转过最后一个转角，出现在平原公路上时，奇迹随之发生，有如每年十字架上那张脸的复活。轿车，火车，巴士，不再于峡湾间行驶，引擎一同进出黑烟，四散而去。海港边数以百计鸣响汽笛的大货轮，沿着高速铁路疾驰的特快列车，有罕见名字的商店，放着陌生报纸的巨大支架，转身正对着火车站的地铁口；大胆的色彩，咸湿的味觉，嘈杂的环境，几乎在你踏足之前，大西洋的神秘就已经包围了你。\n每一个人都听说过“大西洋门户”，但除非身在此地，否则你无法想象这个城市有如此光辉，以至于无论何时有人在中央大街跳起舞来都是不令人惊讶的。伦敦是帝国首都，但它庄严的肃穆是属于帝国，属于欧洲，无疑属于荣耀的。而布里斯托尔属于贸易，属于大西洋，属于一切“梦想”。早在15世纪初，布里斯托尔的商人们便前往遥远的大西洋彼岸，随着巴斯克人在纽芬兰多石的砾滩上晾晒鱼干。到今天，布里斯托尔无疑是大西洋的门户，大西洋的中心。加勒比的蔗糖，哈德逊的毛皮，伊比利亚的葡萄酒，全部随着庞大的商船队源源不断地输入不列颠。布里斯托尔的商店里塞满了好东西，甚至远胜于传说中香气怡人的东方市场。大衣？没问题，我们有十三家毛皮公司。水果？当然了，这是从加勒比送的特快水果；工具？问对地方了，我们的工业部门能生产从扳手到游轮的一切物品，只要您想要。似乎是创新，活力以及生机勃勃的矛盾，让一切都显得年轻。一种无限可能的活力在空气中传播，像杯柠檬红般显得鲜艳，美好。\n在大桥巨大的高塔中间，城市的摩天大厦在阳光中闪耀，建筑高处的玻璃闪闪发光，方尖塔在阴影中飘进飘出；港口的灯塔如同王座般金光灿烂。我如同这里的每一个人一样，几乎是原样地在心中感叹：“感谢上帝，让我站立在这里。”\n然而，世界看起来总是没那么好。在资本，英镑与贪婪的交响曲下，城市四周破败的贫民窟显得更加破败与凄凉：倒塌的房屋，暗淡的灯光，坐在破旧台阶上抽着卷烟的佛罗里达老人，或是像是从未踏出过家里的波多黎各女性——如果说那种棚户区也能算是“家”的话。\n然而，处在一个如此蓬勃的巨型生命体间，有时很容易使人们忘记他们的良知。在公园，大厦与英镑之间，远在市区之外的贫困确实显得太不显眼。但当我站在大顶端的观景台时，我看着繁华的市区……"
 LON_RAR.18.a: "……远在贫民窟之内。"










